<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/static/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/static/favicon/site.webmanifest" />

    <title>LOS</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <main>
        <section id="controls">
            <h1>Line of Sight.</h1>
            <p class="subtitle">Create a viewshed of any location in the US.</p>
            <label>
                Latitude
                <input
                    id="lat"
                    type="number"
                    step="any"
                    min="-90"
                    max="90"
                    value="48.629947"
                    placeholder="48.629947"
                    autocomplete="off"
                >
            </label>
            <label>
                Longitude
                <input
                    id="lon"
                    type="number"
                    step="any"
                    min="-180"
                    max="180"
                    value="-122.407499"
                    placeholder="-122.407499"
                    autocomplete="off"
                >
            </label>
            <div class="button-row">
                <button onclick="getLocation()">Use My Location</button>
                <button onclick="randomizeLocation()">Random</button>
            </div>
            <button onclick="loadMap()">Highlight</button>
        </section>
        <div id="mapContainer" aria-live="polite">
            <p>Enter coordinates and click Highlight.</p>
        </div>
    </main>

    <script src="/static/mapControls.js"></script>
</body>
</html>
