<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOS</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <main>
        <section id="controls">
            <h1>Line of Sight.</h1>
            <p class="subtitle">Create a viewshed of any location in the US.</p>
            <label>
                Latitude
                <input
                    id="lat"
                    type="number"
                    step="any"
                    min="-90"
                    max="90"
                    value="48.629947"
                    placeholder="48.629947"
                    autocomplete="off"
                >
            </label>
            <label>
                Longitude
                <input
                    id="lon"
                    type="number"
                    step="any"
                    min="-180"
                    max="180"
                    value="-122.407499"
                    placeholder="-122.407499"
                    autocomplete="off"
                >
            </label>
            <button onclick="loadMap()">Highlight</button>
        </section>
        <div id="mapContainer" aria-live="polite">
            <p>Enter coordinates and click Highlight.</p>
        </div>
    </main>

    <script src="/static/loadMap.js"></script>
</body>
</html>
